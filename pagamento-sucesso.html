<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chave da Essência — Pagamento confirmado!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/style/main.css" />
  <link rel="stylesheet" href="/style/captacao.css" />
</head>
<body>
  <div class="form-page">
    <img src="/assets/logo.svg" alt="Chave da Essência" class="form-logo" style="height:56px;margin-bottom:32px;" />

    <div class="form-card" style="max-width:480px;text-align:center;padding:56px 48px;">
      <div style="font-size:2.5rem;color:var(--rosa);margin-bottom:20px;">✦</div>
      <h1 class="form-titulo" style="margin-bottom:12px;">Pagamento confirmado!</h1>
      <p class="form-subtitulo" style="margin-bottom:36px;line-height:1.8;">
        O seu pagamento foi aprovado com sucesso.<br/>
        O seu Mapa Numerológico está pronto para revelar os seus números.
      </p>

      <a href="/index.html" style="
        display:block;
        padding:16px;
        background:linear-gradient(135deg,var(--roxo),var(--roxo-medio));
        color:#fff;
        border-radius:4px;
        font-family:var(--sans);
        font-size:0.82rem;
        font-weight:600;
        letter-spacing:0.1em;
        text-transform:uppercase;
        text-decoration:none;
        box-shadow:0 4px 20px rgba(75,32,144,0.25);
        margin-bottom:16px;
      ">
        Gerar o meu Mapa agora →
      </a>

      <p style="font-size:0.72rem;color:var(--texto-suave);margin-top:16px;">
        Os seus dados já estão preenchidos. É só confirmar e gerar.
      </p>
    </div>

    <p class="form-rodape" style="margin-top:32px;">
      Chave da Essência · Numerologia Pitagórica
    </p>
  </div>
</body>
</html>
